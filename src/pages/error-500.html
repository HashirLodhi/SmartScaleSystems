<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error | Smart Scale Systems</title>
  <meta name="description" content="Something went wrong while processing your request." />
  <meta name="robots" content="noindex, nofollow" />
</head>
<body>
<section class="error-page page-hero" aria-labelledby="error-title">
  <div class="error-orbit" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <div class="error-page-inner">
    <div class="error-code" aria-hidden="true">500</div>
    <div class="section-tag">System Error</div>
    <h1 class="error-title page-hero-title" id="error-title">Something went<br/>off script.</h1>
    <p class="error-description page-hero-subtitle">We couldn’t complete that request. Please try again, or contact our team if the problem continues.</p>
    <div class="error-actions">
      <a href="/" class="btn-primary large">Back to Home</a>
      <a href="/contact" class="btn-ghost">Contact Support</a>
    </div>
  </div>
</section>
</body>
</html>
