<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Smart Scale Systems</title>
  <meta name="description" content="The requested page could not be found." />
  <meta name="robots" content="noindex, follow" />
</head>
<body>
<section class="error-page error-page--404 page-hero" aria-labelledby="error-title">
  <div class="error-grid" aria-hidden="true"></div>
  <div class="error-scan" aria-hidden="true"></div>
  <div class="error-orbit error-orbit--outer" aria-hidden="true">
    <span></span><span></span><span></span>
    <div class="error-orbit error-orbit--inner">
      <span></span><span></span>
    </div>
  </div>
  <div class="error-page-inner">
    <div class="error-status" aria-hidden="true">
      <span class="error-status-dot"></span>
      Route signal lost
    </div>
    <div class="error-code error-code--glitch" data-code="404" aria-hidden="true">404</div>
    <div class="section-tag">Page Not Found</div>
    <h1 class="error-title page-hero-title" id="error-title">This page does<br/>not exist.</h1>
    <p class="error-description page-hero-subtitle">The link may be outdated, or the page may have moved. Let’s get you back to something useful.</p>
    <div class="error-actions">
      <a href="/" class="btn-primary large">Back to Home</a>
      <a href="/services" class="btn-ghost">Explore Services</a>
    </div>
    <div class="error-telemetry" aria-hidden="true">
      <span>ERR_ROUTE_404</span>
      <span>SMART SCALE NETWORK</span>
      <span>RECOVERY READY</span>
    </div>
  </div>
</section>
</body>
</html>
